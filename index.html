<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1> Lost & Found</h1>
        <nav style="margin-top: 1.5rem;">
            <a href="index.html" style="margin-right: 1.5rem; font-weight: bold; color: #3498db; text-decoration: none;"
            >Browse Items</a>
            <a href="report.html" style="font-weight: bold; color: #7f8c8d; text-decoration: none;"
            >Report an Item</a>
        </nav>
    </header>

    <main>
        <section style="background: transparent;  padding: 0 0 2rem ; display: flex; gap: 1rem;">
            <input type="search" id="search-bar" placeholder="Search for items..." style="flex: 2;">
            <select id="filter-status" style="flex: 1;">
                <option value="All">All Items</option>
                <option value="Lost">Lost Only</option>
                <option value="Found">Found Only</option>
            </select>
        </section>
    
            <div id="items-board">
                <p>Loading items...</p>
            </div>
    </main>

    <script src="board.js"></script>
</body>
</html>
