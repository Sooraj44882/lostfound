<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Item - Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1> Lost & Found</h1>
        <nav style="margin-top: 1.5rem;">
            <a href="index.html" style="margin-right: 1.5rem; font-weight: bold; color: #7f8c8d; text-decoration: none;"
            >Browse Items</a>
            <a href="report.html" style="font-weight: bold; color: #3498db; text-decoration: none;"
            >Report an Item</a>
        </nav>
    </header>

    <main>
        <section>
            <h2 style="margin-top: 0; color: #2c3e50;">Submit a Listing</h2>
            
            <form id="item-form">
                <label>What is the item?</label>
                <input type="text" id="title" required placeholder="e.g., Blue Jacket">
                
                <fieldset>
                    <div>
                        <label>Status</label>
                        <select id="type">
                            <option value="Lost">I Lost This</option>
                            <option value="Found">I Found This</option>
                        </select>
                    </div>
                    <div>
                        <label>Photo (Optional)</label>
                        <input type="file" id="image" accept="image/*">
                    </div>
                </fieldset>

                <label>Contact Email</label>
                <input type="email" id="contact" required placeholder="you@example.com">

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <script src="report.js"></script>
</body>
</html>
